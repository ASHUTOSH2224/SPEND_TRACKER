services:
  api:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-spend_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SQLALCHEMY_ECHO: ${SQLALCHEMY_ECHO:-false}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local_fake}
      STORAGE_LOCAL_ROOT: /app/.local_storage
    volumes:
      - ../backend:/app/backend
      - statement_storage:/app/.local_storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    command: python -m app.workers.statement_worker
    environment:
      APP_ENV: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-spend_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SQLALCHEMY_ECHO: ${SQLALCHEMY_ECHO:-false}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local_fake}
      STORAGE_LOCAL_ROOT: /app/.local_storage
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-10}
      LLM_PROVIDER_BACKEND: ${LLM_PROVIDER_BACKEND:-noop}
    volumes:
      - ../backend:/app/backend
      - statement_storage:/app/.local_storage
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spend_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-spend_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  statement_storage:
